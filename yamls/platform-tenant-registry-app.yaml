---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-tenant-registry
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/${github_org}/platform-tenant-registry'
    targetRevision: main
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
